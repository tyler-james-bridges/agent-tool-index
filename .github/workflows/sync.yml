name: Sync Registry
on:
  schedule:
    - cron: '15 */2 * * *'  # Every 2 hours at :15
  workflow_dispatch: {}  # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Sync registry
        run: cargo run --release -- sync
      - name: Export static snapshot
        run: cargo run --release -- export-static
      - name: Validate exported snapshot
        # The suite parses web/registry-data.js and asserts it is internally
        # consistent (chain id, tool_count == tools.len(), non-empty). A bad
        # sync fails here, before the commit, so it never reaches prod.
        run: cargo test --release
      - name: Check for changes
        id: diff
        run: |
          git diff --quiet web/registry-data.js && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/registry-data.js
          git commit -m "chore: sync registry snapshot ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          # Another push (UI work or a prior sync) may land on main between our
          # checkout and push. Rebase onto the latest main and retry; the
          # snapshot is generated, so resolve any conflict in our favor.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push rejected; rebasing onto origin/main (attempt $i)"
            git pull --rebase -X theirs origin main
          done
          echo "failed to push after 5 attempts" >&2
          exit 1