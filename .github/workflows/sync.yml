name: Sync Registry
on:
  schedule:
    - cron: '15 */2 * * *'  # Every 2 hours at :15
  workflow_dispatch: {}  # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Sync registry
        run: cargo run --release -- sync
      - name: Export static snapshot
        run: cargo run --release -- export-static
      - name: Check for changes
        id: diff
        run: |
          git diff --quiet web/registry-data.js && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/registry-data.js
          git commit -m "chore: sync registry snapshot ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push